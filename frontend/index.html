<!DOCTYPE html>
<html>
<head>
<title>AI Mental Fatigue Detection</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:350px;
}

h1{ margin-bottom:10px; }

.description{
    color:#555;
    margin-bottom:20px;
}

video{
    border-radius:10px;
    margin-bottom:15px;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

#score{
    margin-top:10px;
    font-size:16px;
    font-weight:bold;
}

/* 🔥 Progress bar */
.score-bar{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
    margin-top:10px;
}

#bar{
    height:100%;
    width:0%;
    background:red;
    border-radius:10px;
    transition:0.5s;
}

.footer{
    margin-top:30px;
    font-size:13px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Mental Fatigue Detection</h1>

<p class="description">
Detect mental fatigue using face and voice analysis
</p>

<!-- 🔥 Webcam -->
<video id="video" width="300" autoplay></video>

<button onclick="checkFatigue()">Check Fatigue</button>

<p id="result"></p>
<p id="score"></p>

<!-- 🔥 Progress bar -->
<div class="score-bar">
    <div id="bar"></div>
</div>

<div class="footer">
Powered by AI Fatigue Detection System
</div>

</div>

<script>

const video = document.getElementById("video");

// 🔥 Start webcam
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    console.log("Camera error:", err);
});

function checkFatigue(){

    const resultElement = document.getElementById("result");
    const scoreElement = document.getElementById("score");
    const bar = document.getElementById("bar");

    resultElement.innerText = "🔄 Checking fatigue...";
    resultElement.style.color = "black";
    scoreElement.innerText = "";

    fetch("http://127.0.0.1:5000/check-fatigue")

    .then(response => response.json())

    .then(data => {

        const status = data["Fatigue Status"];
        const score = data["Fatigue Score (%)"];

        if(status === "Fatigued"){

            resultElement.innerText =
            "⚠️ Fatigue Detected! Please take some rest.";
            resultElement.style.color = "red";

            // 🔔 Alert
            alert("⚠️ You are fatigued! Take rest!");

        } else {

            resultElement.innerText =
            "✅ You look Normal and Active.";
            resultElement.style.color = "green";
        }

        // 🔥 Show score
        if(score !== undefined){
            scoreElement.innerText = "Fatigue Score: " + score + "%";

            // 🔥 Update progress bar
            bar.style.width = score + "%";
        }

    })

    .catch(error => {

        resultElement.innerText = "❌ Server not running!";
        resultElement.style.color = "orange";

    });

}

</script>

</body>
</html>
